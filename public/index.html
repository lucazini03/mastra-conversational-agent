<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Il Professore — Italian Tutor STS</title>
    <style>
      :root {
        color-scheme: light;
        --bg-0: #f3efe3;
        --bg-1: #f8f4ea;
        --bg-2: #f2e4c8;
        --ink: #1c1b1a;
        --muted: #5e5447;
        --accent: #9f2d23;
        --accent-2: #007a53;
        --card: rgba(255, 255, 255, 0.85);
        --border: rgba(28, 27, 26, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at -10% -10%, var(--bg-2), transparent 60%),
          radial-gradient(800px 500px at 100% 10%, #f7dcc8, transparent 60%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1));
      }

      .shell {
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      .title {
        margin: 0;
        letter-spacing: 0.02em;
        font-size: clamp(1.9rem, 4vw, 2.8rem);
      }

      .subtitle {
        margin: 6px 0 22px;
        color: var(--muted);
        font-size: 1rem;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--card);
        backdrop-filter: blur(5px);
        padding: 18px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .assistant-picker {
        margin: 0 0 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .assistant-btn {
        background: rgba(255, 255, 255, 0.75);
        color: var(--ink);
        border: 1px solid var(--border);
      }

      .assistant-btn.active {
        background: var(--accent-2);
        color: #fff;
        border-color: transparent;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 0.95rem;
        font-family: inherit;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      #startBtn {
        background: var(--accent-2);
        color: #fff;
      }

      #stopBtn {
        background: var(--accent);
        color: #fff;
      }

      #testBtn {
        background: var(--muted);
        color: #fff;
      }

      .status {
        margin: 0 0 14px;
        color: var(--muted);
        font-style: italic;
      }

      .composer {
        margin: 0 0 14px;
        display: flex;
        gap: 8px;
      }

      #chatInput {
        flex: 1;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 10px 14px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.95);
      }

      #chatInput:disabled {
        opacity: 0.55;
      }

      #sendBtn {
        background: #2f3d4a;
        color: #fff;
      }

      .log {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        min-height: 300px;
        max-height: 50vh;
        overflow: auto;
        padding: 12px;
      }

      .line {
        margin: 0 0 10px;
        line-height: 1.35;
      }

      .line .role {
        font-weight: 700;
      }

      .line.user .role {
        color: #106c4a;
      }

      .line.model .role {
        color: #8c261d;
      }

      .line.system {
        color: #4e5968;
      }

      .line.rag {
        color: #6a2f12;
      }

      .line.rag .badge {
        display: inline-block;
        margin-right: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
        font-weight: 700;
        background: #f0c88b;
        border: 1px solid #bb8b43;
        color: #5a3609;
      }

      @media (max-width: 620px) {
        .panel {
          padding: 14px;
        }

        .log {
          min-height: 240px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 class="title">Il Professore</h1>
      <p class="subtitle">Real-time Italian tutor powered by Gemini Live speech-to-speech.</p>

      <section class="panel">
        <div class="controls">
          <button id="startBtn">Start Lesson</button>
          <button id="stopBtn" disabled>End Lesson</button>
          <button id="testBtn" disabled>Test Disconnect</button>
        </div>

        <div class="assistant-picker" id="assistantPicker"></div>

        <div class="composer">
          <input id="chatInput" type="text" placeholder="Write your message here..." disabled />
          <button id="sendBtn" disabled>Send</button>
        </div>

        <p class="status" id="status">Idle.</p>
        <div class="log" id="log"></div>
      </section>
    </main>

    <script>
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const testBtn = document.getElementById('testBtn');
      const sendBtn = document.getElementById('sendBtn');
      const chatInput = document.getElementById('chatInput');
      const assistantPicker = document.getElementById('assistantPicker');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');

      const ASSISTANTS = [
        { id: 'professor', label: 'Il Professore' },
        { id: 'interview_coach', label: 'Interview Coach' },
        { id: 'study_tutor', label: 'Study Tutor' },
        { id: 'audioguide', label: 'Audioguida' },
        { id: 'immigration_assistant', label: 'Immigration Assistant' },
        { id: 'language_tutor', label: 'Language Tutor' },
      ];

      let selectedAssistantId = ASSISTANTS[0].id;

      let ws = null;
      let stream = null;
      let audioContext = null;
      let micProcessor = null;
      let micSource = null;
      let sessionReady = false;

      // ── Playback state ──────────────────────────────────────────────────────
      // Gemini outputs 24kHz mono Int16 PCM.
      // We use a dedicated AudioContext locked to 24000 Hz so the browser
      // never silently resamples the audio (which was the root cause of
      // quality degradation with the raw binary frame approach).
      const PLAYBACK_SAMPLE_RATE = 24000;
      const MIC_SAMPLE_RATE = 16000;
      const INTERRUPT_THRESHOLD = 0.035;
      const INTERRUPT_CONSECUTIVE_FRAMES = 1;

      let playbackCtx = null;
      let nextPlaybackTime = 0;
      const activePlaybackSources = new Set();
      const TRANSCRIPT_MERGE_WINDOW_MS = 1400;
      let lastTranscriptEntry = null;
      let consecutiveAboveThresholdFrames = 0;

      // ── Helpers ─────────────────────────────────────────────────────────────

      function mergeTranscriptText(previous, incoming) {
        const prev = String(previous ?? '').trim();
        const next = String(incoming ?? '').trim();
        if (!prev) return next;
        if (!next) return prev;

        // When the model sends incremental hypotheses, prefer the longer update
        // instead of blindly concatenating repeated prefixes.
        if (next.startsWith(prev)) return next;
        if (prev.startsWith(next)) return prev;

        const maxOverlap = Math.min(prev.length, next.length);
        for (let overlap = maxOverlap; overlap >= 1; overlap--) {
          if (prev.slice(-overlap) === next.slice(0, overlap)) {
            return `${prev}${next.slice(overlap)}`.trim();
          }
        }

        return `${prev} ${next}`.replace(/\s+/g, ' ').trim();
      }

      function createTranscriptLine(role, text) {
        const p = document.createElement('p');
        p.className = `line ${role}`;
        if (role === 'user' || role === 'model') {
          const label = role === 'user' ? 'You' : 'Il professore';
          p.innerHTML = `<span class="role">${label}:</span> ${text}`;
        } else if (role === 'rag') {
          p.innerHTML = `<span class="badge">RAG TOOL CALLED</span>${text}`;
        } else {
          p.textContent = text;
        }
        logEl.appendChild(p);
        logEl.scrollTop = logEl.scrollHeight;
        return p;
      }

      function updateTranscriptLine(entry, text) {
        if (!entry?.el) return;
        const label = entry.role === 'user' ? 'You' : 'Il professore';
        entry.el.innerHTML = `<span class="role">${label}:</span> ${text}`;
      }

      function logLine(role, text) {
        if (role !== 'user' && role !== 'model') {
          createTranscriptLine(role, text);
          return;
        }

        const now = Date.now();
        const normalizedText = String(text ?? '').trim();
        if (!normalizedText) return;

        if (
          lastTranscriptEntry &&
          lastTranscriptEntry.role === role &&
          now - lastTranscriptEntry.at <= TRANSCRIPT_MERGE_WINDOW_MS
        ) {
          const merged = mergeTranscriptText(lastTranscriptEntry.text, normalizedText);
          lastTranscriptEntry.text = merged;
          lastTranscriptEntry.at = now;
          updateTranscriptLine(lastTranscriptEntry, merged);
          logEl.scrollTop = logEl.scrollHeight;
          return;
        }

        const el = createTranscriptLine(role, normalizedText);
        lastTranscriptEntry = { role, text: normalizedText, at: now, el };
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setAssistantButtonsDisabled(disabled) {
        const buttons = assistantPicker.querySelectorAll('button');
        buttons.forEach((btn) => {
          btn.disabled = disabled;
        });
      }

      function getSelectedAssistantLabel() {
        const assistant = ASSISTANTS.find((item) => item.id === selectedAssistantId);
        return assistant ? assistant.label : 'Assistant';
      }

      function renderAssistantButtons() {
        assistantPicker.innerHTML = '';
        ASSISTANTS.forEach((assistant) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'assistant-btn';
          btn.textContent = assistant.label;
          if (assistant.id === selectedAssistantId) {
            btn.classList.add('active');
          }

          btn.addEventListener('click', () => {
            if (ws) return;
            selectedAssistantId = assistant.id;
            renderAssistantButtons();
            setStatus(`Assistant selected: ${assistant.label}`);
          });

          assistantPicker.appendChild(btn);
        });
      }

      // Convert signed Int16 PCM samples to Float32 [-1, 1]
      function int16ToFloat32(int16Array) {
        const out = new Float32Array(int16Array.length);
        for (let i = 0; i < int16Array.length; i++) {
          out[i] = Math.max(-1, Math.min(1, int16Array[i] / 32768));
        }
        return out;
      }

      // Convert Float32 [-1, 1] to signed Int16 PCM
      function float32ToInt16(floatArray) {
        const out = new Int16Array(floatArray.length);
        for (let i = 0; i < floatArray.length; i++) {
          const s = Math.max(-1, Math.min(1, floatArray[i]));
          out[i] = s < 0 ? s * 32768 : s * 32767;
        }
        return out;
      }

      // Linear resample from sourceRate to targetRate for mono Float32 PCM
      function resampleMonoFloat32(floatArray, sourceRate, targetRate) {
        if (sourceRate === targetRate) return floatArray;
        const ratio = sourceRate / targetRate;
        const outLength = Math.max(1, Math.floor(floatArray.length / ratio));
        const out = new Float32Array(outLength);

        for (let i = 0; i < outLength; i++) {
          const srcIndex = i * ratio;
          const index0 = Math.floor(srcIndex);
          const index1 = Math.min(index0 + 1, floatArray.length - 1);
          const frac = srcIndex - index0;
          out[i] = floatArray[index0] * (1 - frac) + floatArray[index1] * frac;
        }

        return out;
      }

      // Decode a base64 string to an ArrayBuffer
      function base64ToArrayBuffer(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      // Encode an ArrayBuffer (or typed array buffer) to base64
      function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      // ── Playback ─────────────────────────────────────────────────────────────

      function stopAndClearPlayback() {
        for (const source of activePlaybackSources) {
          try { source.stop(); } catch (_) {}
        }
        activePlaybackSources.clear();
        nextPlaybackTime = 0;
      }

      // Called when a tts_audio JSON message arrives.
      // data is the base64 string from the server.
      function enqueueTtsAudio(b64data) {
        const arrayBuffer = base64ToArrayBuffer(b64data);

        // Safety: ensure even byte count for Int16 interpretation
        const byteLen = arrayBuffer.byteLength % 2 !== 0
          ? arrayBuffer.byteLength - 1
          : arrayBuffer.byteLength;

        const int16 = new Int16Array(arrayBuffer, 0, byteLen / 2);
        schedulePlaybackChunk(int16);
      }

      function schedulePlaybackChunk(int16) {
        if (!playbackCtx) {
          // Lock to exactly 24000 Hz — matches Gemini Live output rate.
          // This is the key fix: the old raw-binary path let the browser
          // create an AudioContext at its default rate (44100/48000 Hz)
          // and silently resample, causing degraded quality.
          playbackCtx = new AudioContext({ sampleRate: PLAYBACK_SAMPLE_RATE });
        }

        if (playbackCtx.state === 'suspended') {
          void playbackCtx.resume();
        }

        const floatData = int16ToFloat32(int16);
        const audioBuffer = playbackCtx.createBuffer(1, floatData.length, PLAYBACK_SAMPLE_RATE);
        audioBuffer.copyToChannel(floatData, 0);

        const source = playbackCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(playbackCtx.destination);

        // Schedule chunks on the audio timeline to avoid event-loop gaps.
        const now = playbackCtx.currentTime;
        if (nextPlaybackTime < now + 0.01) {
          nextPlaybackTime = now + 0.01;
        }

        activePlaybackSources.add(source);
        source.onended = () => {
          activePlaybackSources.delete(source);
        };
        source.start(nextPlaybackTime);
        nextPlaybackTime += audioBuffer.duration;
      }
      
      // ── Mic capture ──────────────────────────────────────────────────────────

      function stopMicCapture() {
        if (micProcessor) {
          micProcessor.disconnect();
          micProcessor.onaudioprocess = null;
          micProcessor = null;
        }
        if (micSource) {
          micSource.disconnect();
          micSource = null;
        }
        if (audioContext) {
          void audioContext.close();
          audioContext = null;
        }
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }
      }

      async function startMicCapture() {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            sampleRate: MIC_SAMPLE_RATE,  // Request 16kHz from the browser
            echoCancellation: true,
            noiseSuppression: true,
          },
        });

        // Force the AudioContext to 16kHz regardless of what the browser
        // negotiated for the mic. This guarantees Gemini receives audio at
        // the correct rate even if the OS/driver ignored the sampleRate hint.
        audioContext = new AudioContext({ sampleRate: MIC_SAMPLE_RATE });
        micSource = audioContext.createMediaStreamSource(stream);
        micProcessor = audioContext.createScriptProcessor(4096, 1, 1);

        micProcessor.onaudioprocess = (event) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;

          const input = event.inputBuffer.getChannelData(0);

          // Interrupt bot playback if the user speaks above threshold
          let sum = 0;
          for (let i = 0; i < input.length; i++) {
            sum += input[i] * input[i];
          }
          const rms = Math.sqrt(sum / input.length);
          if (rms > INTERRUPT_THRESHOLD) {
            consecutiveAboveThresholdFrames += 1;
          } else {
            consecutiveAboveThresholdFrames = 0;
          }

          if (
            consecutiveAboveThresholdFrames >= INTERRUPT_CONSECUTIVE_FRAMES &&
            activePlaybackSources.size > 0
          ) {
            stopAndClearPlayback();
            logLine(
              'system',
              `Local interrupt (client RMS gate): rms=${rms.toFixed(3)} > ${INTERRUPT_THRESHOLD.toFixed(3)} for ${INTERRUPT_CONSECUTIVE_FRAMES} consecutive frames.`,
            );
            console.warn(
              '[local-interrupt] client RMS gate triggered',
              { rms, threshold: INTERRUPT_THRESHOLD, consecutiveFrames: INTERRUPT_CONSECUTIVE_FRAMES },
            );
            consecutiveAboveThresholdFrames = 0;
          }

          // Convert Float32 → Int16 PCM and send as JSON+base64.
          // If the runtime context rate is not 16kHz, resample first.
          const sourceRate = audioContext ? audioContext.sampleRate : MIC_SAMPLE_RATE;
          const mono16k = resampleMonoFloat32(input, sourceRate, MIC_SAMPLE_RATE);

          // Using JSON+base64 (instead of raw binary frames) ensures the
          // server knows exactly what it is receiving and applies the correct
          // byte-alignment checks before passing to Gemini.
          const int16 = float32ToInt16(mono16k);
          const b64 = arrayBufferToBase64(int16.buffer);
          ws.send(JSON.stringify({ type: 'audio_chunk', data: b64 }));
        };

        micSource.connect(micProcessor);
        micProcessor.connect(audioContext.destination);
      }

      // ── WebSocket session ────────────────────────────────────────────────────

      function sendTextPrompt() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const text = chatInput.value.trim();
        if (!text) return;

        // Typed messages should barge-in exactly like VAD speech input.
        // Stop any currently playing bot audio before submitting the new turn.
        stopAndClearPlayback();

        ws.send(JSON.stringify({ type: 'text_prompt', text }));
        chatInput.value = '';
      }

      async function startSession() {
        if (ws) return;

        sessionReady = false;
        startBtn.disabled = true;
        setStatus('Connecting...');

        const scheme = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${scheme}//${window.location.host}`);
        // All frames are text (JSON). No binary frames expected.
        ws.binaryType = 'arraybuffer';

        ws.onopen = async () => {
          try {
            await startMicCapture();
            ws.send(JSON.stringify({ type: 'start_session', assistantId: selectedAssistantId }));
            stopBtn.disabled = false;
            testBtn.disabled = false;
            sendBtn.disabled = false;
            chatInput.disabled = false;
            setAssistantButtonsDisabled(true);
            setStatus(`Connecting to ${getSelectedAssistantLabel()}...`);
            logLine('system', `Microphone ready. Waiting for ${getSelectedAssistantLabel()}...`);
          } catch (err) {
            logLine('system', `Microphone error: ${err instanceof Error ? err.message : String(err)}`);
            stopSession();
          }
        };

        ws.onmessage = (event) => {
          // All server messages are JSON text frames
          if (typeof event.data !== 'string') return;

          let msg;
          try {
            msg = JSON.parse(event.data);
          } catch {
            logLine('system', event.data);
            return;
          }

          if (msg.type === 'status') {
            setStatus(msg.message);
            if (typeof msg.message === 'string' && msg.message.includes('Connected!') && !sessionReady) {
              sessionReady = true;
              logLine('system', 'Session started.');
            }
          }

          if (msg.type === 'error') {
            setStatus('Connection failed. Please try again.');
            logLine('system', `Error: ${msg.message}`);
            stopSession();
          }

          if (msg.type === 'transcript') {
            logLine(msg.role, msg.text);
          }

          if (msg.type === 'rag_tool_called') {
            const sourceList = Array.isArray(msg.sources) ? msg.sources : [];
            const scoreList = Array.isArray(msg.scores) ? msg.scores : [];
            const sourceText = sourceList.length > 0 ? sourceList.join(', ') : 'nessuna fonte';
            const scoreText = scoreList
              .slice(0, 3)
              .map((s) => `${s.file}=${Number(s.score).toFixed(3)}`)
              .join(' | ');

            const details = scoreText
              ? `query="${msg.query}" | fonti: ${sourceText} | top: ${scoreText}`
              : `query="${msg.query}" | fonti: ${sourceText}`;

            logLine('rag', details);
          }

          if (msg.type === 'session_cost_summary') {
            const inputTokens = Number(msg.inputTokens ?? 0).toLocaleString();
            const outputTokens = Number(msg.outputTokens ?? 0).toLocaleString();
            const ragTokens = Number(msg.ragTokens ?? 0).toLocaleString();
            const hasPricing = Boolean(msg.pricingConfigured);
            const inputCost = hasPricing ? `$${Number(msg.inputCostUsd ?? 0).toFixed(6)}` : 'N/A';
            const outputCost = hasPricing ? `$${Number(msg.outputCostUsd ?? 0).toFixed(6)}` : 'N/A';
            const ragCost = hasPricing ? `~$${Number(msg.ragCostUsd ?? 0).toFixed(6)}` : 'N/A';
            const totalCost = hasPricing ? `$${Number(msg.estimatedCostUsd ?? 0).toFixed(6)}` : 'N/A';

            logLine(
              'system',
              `SESSION COST SUMMARY | Input Tokens: ${inputTokens} (${inputCost}) | ` +
                `Output Tokens: ${outputTokens} (${outputCost}) | ` +
                `RAG Tokens: ${ragTokens} (${ragCost}, subset of input) | ` +
                `Estimated Cost: ${totalCost}`,
            );
            if (hasPricing) {
              setStatus(`Session cost estimated: ${totalCost}`);
            } else {
              setStatus('Session ended. Pricing not configured in server env.');
            }
          }

          // ── Gemini audio output ──────────────────────────────────────────
          // The server sends { type: 'tts_audio', data: '<base64>' }.
          // The base64 payload is raw Int16 PCM at 24kHz mono.
          // We decode it here and feed it into a 24kHz AudioContext so the
          // browser never needs to resample.
          if (msg.type === 'tts_audio' && msg.data) {
            enqueueTtsAudio(msg.data);
          }
        };

        ws.onerror = () => {
          logLine('system', 'WebSocket error.');
        };

        ws.onclose = () => {
          stopAndClearPlayback();
          stopMicCapture();
          sessionReady = false;
          ws = null;
          startBtn.disabled = false;
          stopBtn.disabled = true;
          testBtn.disabled = true;
          sendBtn.disabled = true;
          chatInput.disabled = true;
          setAssistantButtonsDisabled(false);
          setStatus('Disconnected.');
          logLine('system', 'Session ended.');
        };
      }

      function stopSession() {
        if (!ws) return;

        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'end_session' }));
          ws.close();
        } else {
          ws = null;
        }

        stopMicCapture();
      }

      startBtn.addEventListener('click', () => { void startSession(); });
      stopBtn.addEventListener('click', () => { stopSession(); });
      testBtn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'simulate_disconnect' }));
        }
      });
      sendBtn.addEventListener('click', () => { sendTextPrompt(); });
      chatInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendTextPrompt();
        }
      });

      renderAssistantButtons();
    </script>
  </body>
</html>
