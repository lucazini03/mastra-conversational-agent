<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemorAIz Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #080c14;
        --bg-panel: #0d1321;
        --bg-card: #111827;
        --border: rgba(99, 179, 237, 0.15);
        --border-bright: rgba(99, 179, 237, 0.4);
        --ink: #e2e8f0;
        --muted: #64748b;
        --accent: #38bdf8;
        --accent-2: #7c3aed;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-amber: #f59e0b;
        --glow: rgba(56, 189, 248, 0.18);
        --glow-green: rgba(16, 185, 129, 0.2);
        --user-color: #34d399;
        --model-color: #60a5fa;
        --rag-color: #f59e0b;
        --system-color: #94a3b8;
        --font-display: 'Syne', sans-serif;
        --font-mono: 'Space Mono', monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        font-family: var(--font-mono);
        color: var(--ink);
        background: var(--bg);
        overflow-x: hidden;
      }

      /* Animated grid background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(56,189,248,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .shell {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 48px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }

      .logo-mark {
        width: 52px;
        height: 52px;
        flex-shrink: 0;
        background: linear-gradient(135deg, #0f1f3d 0%, #1a2f55 100%);
        border: 1px solid var(--border-bright);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.07);
      }

      .header-text { flex: 1; }

      .title {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 4vw, 2.5rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #e2e8f0 0%, #38bdf8 60%, #7c3aed 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
      }

      .subtitle {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 4px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .version-badge {
        font-size: 0.65rem;
        font-family: var(--font-mono);
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-bright);
        color: var(--accent);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
        background: rgba(56,189,248,0.06);
      }

      .timer-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .timer-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.65rem;
        font-family: var(--font-mono);
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        background: rgba(148, 163, 184, 0.06);
      }

      .timer-chip.persistent {
        color: var(--accent);
        border-color: rgba(56, 189, 248, 0.24);
        background: rgba(56, 189, 248, 0.08);
      }

      .timer-chip.resettable {
        color: var(--muted);
      }

      .timer-label {
        opacity: 0.8;
      }

      .timer-value {
        font-weight: 700;
        letter-spacing: 0.12em;
      }

      /* ── Main layout ── */
      .main-grid {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }

      @media (max-width: 760px) {
        .main-grid { grid-template-columns: 1fr; }
      }

      /* ── Panels ── */
      .panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.65rem;
        font-family: var(--font-mono);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .panel-header-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
      }

      /* ── Robot Avatar ── */
      .avatar-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 20px;
        gap: 16px;
      }

      .robot-container {
        position: relative;
        width: 140px;
        height: 140px;
      }

      .robot-ring {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .robot-ring.speaking {
        border-color: var(--accent);
        box-shadow: 0 0 24px var(--glow), 0 0 48px rgba(56,189,248,0.1);
        animation: ringPulse 1.2s ease-in-out infinite;
      }

      @keyframes ringPulse {
        0%, 100% { box-shadow: 0 0 16px var(--glow), 0 0 32px rgba(56,189,248,0.1); }
        50% { box-shadow: 0 0 32px rgba(56,189,248,0.4), 0 0 64px rgba(56,189,248,0.15); }
      }

      .robot-ring-2 {
        position: absolute;
        inset: -16px;
        border-radius: 50%;
        border: 1px solid transparent;
        transition: border-color 0.3s ease;
      }

      .robot-ring-2.speaking {
        border-color: rgba(56,189,248,0.2);
        animation: ringPulse2 1.2s ease-in-out 0.3s infinite;
      }

      @keyframes ringPulse2 {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      .robot-svg-wrap {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: linear-gradient(160deg, #0f1f3d, #1a2f55);
        border: 1px solid var(--border-bright);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.05);
      }

      /* ── Animated sound bars ── */
      .sound-bars {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 28px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .sound-bars.active { opacity: 1; }

      .sound-bars .bar {
        width: 4px;
        border-radius: 2px;
        background: var(--accent);
        transform-origin: bottom;
        animation: none;
      }

      .sound-bars.active .bar:nth-child(1) { animation: barAnim 0.7s 0.0s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(2) { animation: barAnim 0.7s 0.1s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(3) { animation: barAnim 0.7s 0.05s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(4) { animation: barAnim 0.7s 0.15s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(5) { animation: barAnim 0.7s 0.08s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(6) { animation: barAnim 0.7s 0.2s ease-in-out infinite alternate; }
      .sound-bars.active .bar:nth-child(7) { animation: barAnim 0.7s 0.04s ease-in-out infinite alternate; }

      @keyframes barAnim {
        0% { height: 4px; }
        100% { height: 24px; }
      }

      .status-text {
        font-size: 0.7rem;
        font-family: var(--font-mono);
        color: var(--muted);
        text-align: center;
        letter-spacing: 0.06em;
        min-height: 1.4em;
        transition: color 0.3s;
      }

      .status-text.connected { color: var(--accent-green); }
      .status-text.speaking { color: var(--accent); }
      .status-text.error { color: var(--accent-red); }

      /* ── Assistant selector ── */
      .assistant-picker {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px;
        width: 100%;
      }

      .assistant-btn {
        width: 100%;
        background: transparent;
        color: var(--muted);
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.72rem;
        font-family: var(--font-mono);
        text-align: left;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition: all 0.15s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .assistant-btn:hover:not(:disabled) {
        color: var(--ink);
        background: rgba(56,189,248,0.06);
        border-color: var(--border);
      }

      .assistant-btn.active {
        color: var(--accent);
        background: rgba(56,189,248,0.1);
        border-color: rgba(56,189,248,0.3);
      }

      .assistant-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── Controls ── */
      .controls-row {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 0.72rem;
        font-family: var(--font-mono);
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.15s ease;
        text-transform: uppercase;
      }

      button:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
      button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

      #startBtn {
        background: var(--accent-green);
        color: #022c1b;
        font-weight: 700;
        box-shadow: 0 0 14px rgba(16,185,129,0.25);
      }

      #stopBtn {
        background: rgba(239,68,68,0.15);
        color: var(--accent-red);
        border: 1px solid rgba(239,68,68,0.3);
      }

      #testBtn {
        background: rgba(100,116,139,0.15);
        color: var(--muted);
        border: 1px solid rgba(100,116,139,0.2);
      }

      /* ── Right column ── */
      .right-col {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .right-col .composer-panel {
        width: 100%;
      }

      /* ── Composer ── */
      .composer-panel {
        padding: 14px 16px;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      #chatInput {
        flex: 1;
        min-width: 0;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 14px;
        font: 0.78rem/1.4 var(--font-mono);
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s;
      }

      #chatInput:focus { border-color: var(--border-bright); }
      #chatInput::placeholder { color: var(--muted); }
      #chatInput:disabled { opacity: 0.4; }

      #sendBtn {
        background: rgba(56,189,248,0.12);
        color: var(--accent);
        border: 1px solid rgba(56,189,248,0.25);
        padding: 9px 18px;
      }

      /* ── Log areas ── */
      .logs-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 600px) {
        .logs-grid { grid-template-columns: 1fr; }
      }

      .log-box {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .log-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.63rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        font-family: var(--font-mono);
        background: rgba(255,255,255,0.015);
      }

      .log-header-accent {
        width: 6px; height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .log-scroll {
        overflow-y: auto;
        padding: 12px;
        min-height: 610px;
        max-height: 740px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: rgba(56,189,248,0.2) transparent;
      }

      /* ── Transcript lines ── */
      .transcript-line {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .transcript-label {
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 700;
        font-family: var(--font-mono);
      }

      .transcript-text {
        font-size: 0.82rem;
        line-height: 1.5;
        padding: 8px 12px;
        border-radius: 8px;
        font-family: var(--font-mono);
      }

      .transcript-line.user .transcript-label { color: var(--user-color); }
      .transcript-line.user .transcript-text {
        background: rgba(52,211,153,0.07);
        border: 1px solid rgba(52,211,153,0.15);
        color: #a7f3d0;
      }

      .transcript-line.model .transcript-label { color: var(--model-color); }
      .transcript-line.model .transcript-text {
        background: rgba(96,165,250,0.07);
        border: 1px solid rgba(96,165,250,0.15);
        color: #bfdbfe;
      }

      /* ── System log lines ── */
      .log-line {
        font-size: 0.7rem;
        line-height: 1.45;
        font-family: var(--font-mono);
        padding: 4px 8px;
        border-radius: 4px;
        color: var(--system-color);
        border-left: 2px solid rgba(148,163,184,0.2);
      }

      .log-line.rag {
        color: var(--rag-color);
        border-left-color: rgba(245,158,11,0.4);
        background: rgba(245,158,11,0.04);
      }

      .log-line.rag .rag-badge {
        display: inline-block;
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 1px 6px;
        border-radius: 3px;
        background: rgba(245,158,11,0.15);
        border: 1px solid rgba(245,158,11,0.3);
        color: var(--rag-color);
        margin-right: 6px;
        text-transform: uppercase;
      }

      .log-line.cost {
        color: #a78bfa;
        border-left-color: rgba(124,58,237,0.4);
        background: rgba(124,58,237,0.04);
      }

      .log-line.error {
        color: var(--accent-red);
        border-left-color: rgba(239,68,68,0.4);
        background: rgba(239,68,68,0.04);
      }

      .empty-state {
        color: var(--muted);
        font-size: 0.7rem;
        text-align: center;
        padding: 24px 0;
        letter-spacing: 0.06em;
        opacity: 0.6;
        font-family: var(--font-mono);
      }

      /* ── Scan line effect on panels ── */
      .scan-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.03) 2px,
          rgba(0,0,0,0.03) 4px
        );
        border-radius: inherit;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <main class="shell">

      <!-- Header -->
      <header class="header">
        <div class="logo-mark">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <circle cx="15" cy="15" r="10" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
            <circle cx="15" cy="15" r="5" fill="#38bdf8" opacity="0.8"/>
            <line x1="15" y1="5" x2="15" y2="2" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="23.7" y1="8.3" x2="25.9" y2="6.1" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <line x1="25" y1="15" x2="28" y2="15" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="title">MemorAIz</h1>
          <p class="subtitle">Real-time AI assistant &mdash; speech-to-speech</p>
        </div>
        <div class="timer-group" aria-label="Conversation timers">
          <span class="timer-chip persistent"><span class="timer-label">Session</span><span class="timer-value" id="conversationTimer">00:00</span></span>
          <span class="timer-chip resettable"><span class="timer-label">Reconn.</span><span class="timer-value" id="connectionTimer">00:00</span></span>
        </div>
        <span class="version-badge">v2.0 live</span>
      </header>

      <!-- Main Grid -->
      <div class="main-grid">

        <!-- Left: Robot + controls -->
        <div style="display:flex;flex-direction:column;gap:14px;">

          <!-- Robot panel -->
          <div class="panel" style="position:relative;">
            <div class="panel-header">
              <div class="panel-header-dot"></div>
              AI Agent
            </div>
            <div class="avatar-panel">
              <!-- Rings -->
              <div class="robot-container" id="robotContainer">
                <div class="robot-ring" id="robotRing"></div>
                <div class="robot-ring-2" id="robotRing2"></div>
                <div class="robot-svg-wrap">
                  <!-- Robot SVG Face -->
                  <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" id="robotSvg">
                    <!-- Head -->
                    <rect x="20" y="22" width="60" height="52" rx="10" fill="#0f2040" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.6"/>
                    <!-- Antenna -->
                    <line x1="50" y1="22" x2="50" y2="10" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.7"/>
                    <circle cx="50" cy="8" r="3.5" fill="#38bdf8" opacity="0.9" id="antennaGlow"/>
                    <!-- Eyes -->
                    <rect x="30" y="36" width="14" height="10" rx="3" fill="#38bdf8" opacity="0.15" id="eyeLeftBg"/>
                    <rect x="56" y="36" width="14" height="10" rx="3" fill="#38bdf8" opacity="0.15" id="eyeRightBg"/>
                    <rect x="32" y="38" width="10" height="6" rx="2" fill="#38bdf8" id="eyeLeft"/>
                    <rect x="58" y="38" width="10" height="6" rx="2" fill="#38bdf8" id="eyeRight"/>
                    <!-- Pupils -->
                    <rect x="36" y="39.5" width="3" height="3" rx="1" fill="#0a1628" id="pupilLeft"/>
                    <rect x="62" y="39.5" width="3" height="3" rx="1" fill="#0a1628" id="pupilRight"/>
                    <!-- Mouth / speaker grill -->
                    <rect x="31" y="56" width="38" height="10" rx="4" fill="#0a1628" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.4"/>
                    <rect x="35" y="59" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.5" id="m1"/>
                    <rect x="42" y="59" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.5" id="m2"/>
                    <rect x="49" y="59" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.5" id="m3"/>
                    <rect x="56" y="59" width="4" height="4" rx="1" fill="#38bdf8" opacity="0.5" id="m4"/>
                    <!-- Ears -->
                    <rect x="12" y="36" width="8" height="14" rx="3" fill="#0f2040" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
                    <rect x="80" y="36" width="8" height="14" rx="3" fill="#0f2040" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
                    <!-- Signal bars (hidden by default) -->
                    <rect x="14" y="45" width="4" height="2" rx="1" fill="#38bdf8" opacity="0.5" id="earBarL"/>
                    <rect x="82" y="45" width="4" height="2" rx="1" fill="#38bdf8" opacity="0.5" id="earBarR"/>
                    <!-- Neck detail -->
                    <rect x="42" y="74" width="16" height="5" rx="2" fill="#0f2040" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
                    <rect x="44" y="75.5" width="12" height="2" rx="1" fill="#38bdf8" opacity="0.3"/>
                  </svg>
                </div>
              </div>

              <!-- Sound bars -->
              <div class="sound-bars" id="soundBars">
                <div class="bar" style="height:6px"></div>
                <div class="bar" style="height:16px"></div>
                <div class="bar" style="height:10px"></div>
                <div class="bar" style="height:22px"></div>
                <div class="bar" style="height:8px"></div>
                <div class="bar" style="height:18px"></div>
                <div class="bar" style="height:12px"></div>
              </div>

              <p class="status-text" id="status">Idle</p>
            </div>
          </div>

          <!-- Assistant selector -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-header-dot" style="background:#7c3aed;box-shadow:0 0 6px #7c3aed;"></div>
              Select assistant
            </div>
            <div class="assistant-picker" id="assistantPicker"></div>
          </div>

          <!-- Controls -->
          <div class="panel">
            <div class="controls-row">
              <button id="startBtn">&#9654; Start</button>
              <button id="stopBtn" disabled>&#9632; End</button>
              <button id="testBtn" disabled>&#x21bb; Test</button>
            </div>
          </div>

        </div>

        <!-- Right: Transcript + System log -->
        <div class="right-col">
          <div class="logs-grid">

            <!-- Transcript -->
            <div class="log-box">
              <div class="log-header">
                <div class="log-header-accent" style="background:var(--accent);box-shadow:0 0 5px var(--accent);"></div>
                Conversation
              </div>
              <div class="log-scroll" id="transcriptLog">
                <div class="empty-state" id="transcriptEmpty">No conversation yet.</div>
              </div>
            </div>

            <!-- System log -->
            <div class="log-box">
              <div class="log-header">
                <div class="log-header-accent" style="background:var(--muted);"></div>
                System log
              </div>
              <div class="log-scroll" id="systemLog">
                <div class="empty-state" id="systemEmpty">No events yet.</div>
              </div>
            </div>

          </div>

          <!-- Composer -->
          <div class="panel">
            <div class="composer-panel">
              <input id="chatInput" type="text" placeholder="Type a message..." disabled />
              <button id="sendBtn" disabled>Send</button>
            </div>
          </div>
        </div>

      </div>

    </main>

    <script src="/ort.min.js"></script>
    <script src="/vad.bundle.min.js"></script>
    <script>
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const testBtn = document.getElementById('testBtn');
      const sendBtn = document.getElementById('sendBtn');
      const chatInput = document.getElementById('chatInput');
      const assistantPicker = document.getElementById('assistantPicker');
      const statusEl = document.getElementById('status');
      const conversationTimerEl = document.getElementById('conversationTimer');
      const connectionTimerEl = document.getElementById('connectionTimer');
      const transcriptLog = document.getElementById('transcriptLog');
      const systemLog = document.getElementById('systemLog');
      const transcriptEmpty = document.getElementById('transcriptEmpty');
      const systemEmpty = document.getElementById('systemEmpty');
      const soundBars = document.getElementById('soundBars');
      const robotRing = document.getElementById('robotRing');
      const robotRing2 = document.getElementById('robotRing2');

      const ASSISTANTS = [
        { id: 'professor', label: 'Il Professore' },
        { id: 'interview_coach', label: 'Intervista di lavoro' },
        { id: 'study_tutor', label: 'Tutor per lo studio' },
        { id: 'audioguide', label: 'Audioguida' },
        { id: 'immigration_assistant', label: 'Immigrazione' },
        { id: 'language_tutor', label: 'Tutor linguistico' },
      ];

      let selectedAssistantId = ASSISTANTS[0].id;
      let ws = null;
      let micVad = null;
      let sessionReady = false;
      let isSpeaking = false;
      let conversationStartAt = null;
      let connectionStartAt = null;
      let conversationTimerInterval = null;
      let connectionTimerInterval = null;

      const PLAYBACK_SAMPLE_RATE = 24000;
      const MIC_SAMPLE_RATE = 16000;
      let playbackCtx = null;
      let nextPlaybackTime = 0;
      const activePlaybackSources = new Set();
      const TRANSCRIPT_MERGE_WINDOW_MS = 1400;
      let lastTranscriptEntry = null;

      // ── Robot animation ──────────────────────────────────────────────────────
      function setRobotSpeaking(speaking) {
        isSpeaking = speaking;
        soundBars.classList.toggle('active', speaking);
        robotRing.classList.toggle('speaking', speaking);
        robotRing2.classList.toggle('speaking', speaking);

        const mouthPieces = ['m1','m2','m3','m4'];
        if (speaking) {
          let tick = 0;
          window._mouthInterval = setInterval(() => {
            tick++;
            mouthPieces.forEach((id, i) => {
              const el = document.getElementById(id);
              const on = Math.sin(tick * 0.6 + i * 0.9) > 0.2;
              el.style.opacity = on ? '0.9' : '0.15';
            });
          }, 80);
          document.getElementById('antennaGlow').style.opacity = '1';
          document.getElementById('antennaGlow').style.filter = 'drop-shadow(0 0 4px #38bdf8)';
        } else {
          clearInterval(window._mouthInterval);
          mouthPieces.forEach(id => {
            document.getElementById(id).style.opacity = '0.5';
          });
          document.getElementById('antennaGlow').style.opacity = '0.9';
          document.getElementById('antennaGlow').style.filter = '';
        }
      }

      // ── Helpers ──────────────────────────────────────────────────────────────
      function mergeTranscriptText(previous, incoming) {
        const prev = String(previous ?? '').trim();
        const next = String(incoming ?? '').trim();
        if (!prev) return next;
        if (!next) return prev;
        if (next.startsWith(prev)) return next;
        if (prev.startsWith(next)) return prev;
        const maxOverlap = Math.min(prev.length, next.length);
        for (let overlap = maxOverlap; overlap >= 1; overlap--) {
          if (prev.slice(-overlap) === next.slice(0, overlap)) {
            return `${prev}${next.slice(overlap)}`.trim();
          }
        }
        return `${prev} ${next}`.replace(/\s+/g, ' ').trim();
      }

      function createTranscriptLine(role, text) {
        transcriptEmpty.style.display = 'none';
        const wrap = document.createElement('div');
        wrap.className = `transcript-line ${role}`;
        const label = document.createElement('div');
        label.className = 'transcript-label';
        label.textContent = role === 'user' ? 'You' : 'MemorAIz';
        const body = document.createElement('div');
        body.className = 'transcript-text';
        body.textContent = text;
        wrap.appendChild(label);
        wrap.appendChild(body);
        transcriptLog.appendChild(wrap);
        transcriptLog.scrollTop = transcriptLog.scrollHeight;
        return { wrap, body };
      }

      function updateTranscriptLine(entry, text) {
        if (!entry?.bodyEl) return;
        entry.bodyEl.textContent = text;
      }

      function logTranscript(role, text) {
        const now = Date.now();
        const normalizedText = String(text ?? '').trim();
        if (!normalizedText) return;

        if (
          lastTranscriptEntry &&
          lastTranscriptEntry.role === role &&
          now - lastTranscriptEntry.at <= TRANSCRIPT_MERGE_WINDOW_MS
        ) {
          const merged = mergeTranscriptText(lastTranscriptEntry.text, normalizedText);
          lastTranscriptEntry.text = merged;
          lastTranscriptEntry.at = now;
          updateTranscriptLine(lastTranscriptEntry, merged);
          transcriptLog.scrollTop = transcriptLog.scrollHeight;
          return;
        }

        const { wrap, body } = createTranscriptLine(role, normalizedText);
        lastTranscriptEntry = { role, text: normalizedText, at: now, wrap, bodyEl: body };
      }

      function logSystem(text, cls = '') {
        systemEmpty.style.display = 'none';
        const el = document.createElement('div');
        el.className = `log-line ${cls}`;
        el.textContent = text;
        systemLog.appendChild(el);
        systemLog.scrollTop = systemLog.scrollHeight;
      }

      function logRag(text) {
        systemEmpty.style.display = 'none';
        const el = document.createElement('div');
        el.className = 'log-line rag';
        el.innerHTML = `<span class="rag-badge">RAG</span>${text}`;
        systemLog.appendChild(el);
        systemLog.scrollTop = systemLog.scrollHeight;
      }

      function setStatus(text, cls = '') {
        statusEl.textContent = text;
        statusEl.className = `status-text ${cls}`;
      }

      function formatConversationDuration(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }

      function updateConversationTimer() {
        if (conversationStartAt === null) {
          conversationTimerEl.textContent = '00:00';
          return;
        }
        conversationTimerEl.textContent = formatConversationDuration(Date.now() - conversationStartAt);
      }

      function startConversationTimer() {
        conversationStartAt = Date.now();
        updateConversationTimer();
        if (conversationTimerInterval) clearInterval(conversationTimerInterval);
        conversationTimerInterval = setInterval(updateConversationTimer, 1000);
      }

      function stopConversationTimer() {
        if (conversationTimerInterval) {
          clearInterval(conversationTimerInterval);
          conversationTimerInterval = null;
        }
        conversationStartAt = null;
        conversationTimerEl.textContent = '00:00';
      }

      function updateConnectionTimer() {
        if (connectionStartAt === null) {
          connectionTimerEl.textContent = '00:00';
          return;
        }
        connectionTimerEl.textContent = formatConversationDuration(Date.now() - connectionStartAt);
      }

      function startConnectionTimer() {
        connectionStartAt = Date.now();
        updateConnectionTimer();
        if (connectionTimerInterval) clearInterval(connectionTimerInterval);
        connectionTimerInterval = setInterval(updateConnectionTimer, 1000);
      }

      function stopConnectionTimer() {
        if (connectionTimerInterval) {
          clearInterval(connectionTimerInterval);
          connectionTimerInterval = null;
        }
        connectionStartAt = null;
        connectionTimerEl.textContent = '00:00';
      }

      function setAssistantButtonsDisabled(disabled) {
        assistantPicker.querySelectorAll('button').forEach(b => b.disabled = disabled);
      }

      function getSelectedAssistantLabel() {
        return ASSISTANTS.find(a => a.id === selectedAssistantId)?.label ?? 'Assistant';
      }

      function renderAssistantButtons() {
        assistantPicker.innerHTML = '';
        ASSISTANTS.forEach(assistant => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = `assistant-btn${assistant.id === selectedAssistantId ? ' active' : ''}`;
          btn.textContent = assistant.label;
          btn.addEventListener('click', () => {
            if (ws) return;
            selectedAssistantId = assistant.id;
            renderAssistantButtons();
            setStatus(`Selected: ${assistant.label}`);
          });
          assistantPicker.appendChild(btn);
        });
      }

      // ── Audio helpers ─────────────────────────────────────────────────────────
      function int16ToFloat32(int16Array) {
        const out = new Float32Array(int16Array.length);
        for (let i = 0; i < int16Array.length; i++) out[i] = Math.max(-1, Math.min(1, int16Array[i] / 32768));
        return out;
      }

      function float32ToInt16(floatArray) {
        const out = new Int16Array(floatArray.length);
        for (let i = 0; i < floatArray.length; i++) {
          const s = Math.max(-1, Math.min(1, floatArray[i]));
          out[i] = s < 0 ? s * 32768 : s * 32767;
        }
        return out;
      }

      function base64ToArrayBuffer(b64) {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
      }

      function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
      }

      function stopAndClearPlayback() {
        for (const source of activePlaybackSources) { try { source.stop(); } catch (_) {} }
        activePlaybackSources.clear();
        nextPlaybackTime = 0;
        setRobotSpeaking(false);
      }

      function enqueueTtsAudio(b64data) {
        const arrayBuffer = base64ToArrayBuffer(b64data);
        const byteLen = arrayBuffer.byteLength % 2 !== 0 ? arrayBuffer.byteLength - 1 : arrayBuffer.byteLength;
        const int16 = new Int16Array(arrayBuffer, 0, byteLen / 2);
        schedulePlaybackChunk(int16);
        setRobotSpeaking(true);
      }

      function schedulePlaybackChunk(int16) {
        if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: PLAYBACK_SAMPLE_RATE });
        if (playbackCtx.state === 'suspended') void playbackCtx.resume();
        const floatData = int16ToFloat32(int16);
        const audioBuffer = playbackCtx.createBuffer(1, floatData.length, PLAYBACK_SAMPLE_RATE);
        audioBuffer.copyToChannel(floatData, 0);
        const source = playbackCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(playbackCtx.destination);
        const now = playbackCtx.currentTime;
        if (nextPlaybackTime < now + 0.01) nextPlaybackTime = now + 0.01;
        activePlaybackSources.add(source);
        source.onended = () => {
          activePlaybackSources.delete(source);
          if (activePlaybackSources.size === 0) setRobotSpeaking(false);
        };
        source.start(nextPlaybackTime);
        nextPlaybackTime += audioBuffer.duration;
      }

      function stopMicCapture() {
        if (micVad) { void micVad.destroy(); micVad = null; }
      }

      async function startMicCapture() {
        if (!window.vad || !window.vad.MicVAD) throw new Error('MicVAD runtime not loaded.');
        micVad = await window.vad.MicVAD.new({
          model: 'legacy',
          startOnLoad: false,
          baseAssetPath: '/',
          onnxWASMBasePath: '/',
          positiveSpeechThreshold: 0.85,
          negativeSpeechThreshold: 0.35,
          minSpeechMs: 96,
          preSpeechPadMs: 160,
          redemptionMs: 900,
          onSpeechStart: () => {
            if (activePlaybackSources.size > 0) {
              stopAndClearPlayback();
              logSystem('VAD: speech detected — playback interrupted.');
            }
          },
          onFrameProcessed: (_probabilities, audioFrame) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const int16 = float32ToInt16(audioFrame);
            const b64 = arrayBufferToBase64(int16.buffer);
            ws.send(JSON.stringify({ type: 'audio_chunk', data: b64 }));
          },
        });
        await micVad.start();
      }

      function sendTextPrompt() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const text = chatInput.value.trim();
        if (!text) return;
        stopAndClearPlayback();
        ws.send(JSON.stringify({ type: 'text_prompt', text }));
        chatInput.value = '';
      }

      async function startSession() {
        if (ws) return;
        sessionReady = false;
        startBtn.disabled = true;
        setStatus('Connecting...', '');

        const scheme = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${scheme}//${window.location.host}`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = async () => {
          try {
            await startMicCapture();
            ws.send(JSON.stringify({ type: 'start_session', assistantId: selectedAssistantId }));
            startConversationTimer();
            stopBtn.disabled = false;
            testBtn.disabled = false;
            sendBtn.disabled = false;
            chatInput.disabled = false;
            setAssistantButtonsDisabled(true);
            setStatus(`Connecting to ${getSelectedAssistantLabel()}...`);
            logSystem(`Microphone ready. Waiting for ${getSelectedAssistantLabel()}...`);
          } catch (err) {
            logSystem(`Microphone error: ${err instanceof Error ? err.message : String(err)}`, 'error');
            stopSession();
          }
        };

        ws.onmessage = (event) => {
          if (typeof event.data !== 'string') return;
          let msg;
          try { msg = JSON.parse(event.data); } catch { logSystem(event.data); return; }

          if (msg.type === 'status') {
            const txt = String(msg.message ?? '');
            if (txt.includes('Connected!') && !sessionReady) {
              sessionReady = true;
              logSystem('Session started.', '');
              setStatus('Connected', 'connected');
              startConnectionTimer();
            } else if (txt.includes('Connessione ripristinata')) {
              startConnectionTimer();
              setStatus(txt, 'connected');
            } else {
              setStatus(txt, txt.toLowerCase().includes('error') ? 'error' : '');
            }
          }

          if (msg.type === 'error') {
            setStatus('Connection failed.', 'error');
            logSystem(`Error: ${msg.message}`, 'error');
            stopSession();
          }

          if (msg.type === 'transcript') {
            logTranscript(msg.role, msg.text);
            if (msg.role === 'model') setStatus('Speaking...', 'speaking');
            if (msg.role === 'user') setStatus('Listening...', 'connected');
          }

          if (msg.type === 'rag_tool_called') {
            const sourceList = Array.isArray(msg.sources) ? msg.sources : [];
            const scoreList = Array.isArray(msg.scores) ? msg.scores : [];
            const sourceText = sourceList.length > 0 ? sourceList.join(', ') : 'no sources';
            const scoreText = scoreList.slice(0, 3).map(s => `${s.file}=${Number(s.score).toFixed(3)}`).join(' | ');
            logRag(scoreText ? `query="${msg.query}" | ${sourceText} | ${scoreText}` : `query="${msg.query}" | ${sourceText}`);
          }

          if (msg.type === 'session_cost_summary') {
            const inputTokens = Number(msg.inputTokens ?? 0).toLocaleString();
            const outputTokens = Number(msg.outputTokens ?? 0).toLocaleString();
            const hasPricing = Boolean(msg.pricingConfigured);
            const totalCost = hasPricing ? `$${Number(msg.estimatedCostUsd ?? 0).toFixed(6)}` : 'N/A';
            logSystem(
              `Cost summary — In: ${inputTokens} | Out: ${outputTokens} | Est: ${totalCost}`,
              'cost'
            );
            setStatus(hasPricing ? `Session cost: ${totalCost}` : 'Session ended.', '');
          }

          if (msg.type === 'tts_audio' && msg.data) {
            enqueueTtsAudio(msg.data);
          }
        };

        ws.onerror = () => logSystem('WebSocket error.', 'error');

        ws.onclose = () => {
          stopAndClearPlayback();
          stopMicCapture();
          stopConversationTimer();
          stopConnectionTimer();
          setRobotSpeaking(false);
          sessionReady = false;
          ws = null;
          startBtn.disabled = false;
          stopBtn.disabled = true;
          testBtn.disabled = true;
          sendBtn.disabled = true;
          chatInput.disabled = true;
          setAssistantButtonsDisabled(false);
          setStatus('Idle', '');
          logSystem('Session ended.');
        };
      }

      function stopSession() {
        if (!ws) return;
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'end_session' }));
          ws.close();
        } else { ws = null; }
        stopMicCapture();
      }

      startBtn.addEventListener('click', () => void startSession());
      stopBtn.addEventListener('click', () => stopSession());
      testBtn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'simulate_disconnect' }));
      });
      sendBtn.addEventListener('click', () => sendTextPrompt());
      chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendTextPrompt(); } });

      renderAssistantButtons();
    </script>
  </body>
</html>
